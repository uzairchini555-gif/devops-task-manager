name: Docker Build and Push 
on:
  push:
    branches: 
      - main
jobs: build-and-push:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout Code 
      uses: actions/checkout@v4

    - name: Login to Docker Hub 
      uses: docker/login-action@v3
    with: 
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image 
      run: |
        docker build -t uzairchini/devops-task-manager:latest .
    
    - name: Push Image
      run: |
        docker push uzairchini/devops-task-manager:latest
        