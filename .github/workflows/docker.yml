name: Docker Build and Push 
on: 
 push: 
  branches: 
    - main
jobs: 
  build-and-push:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: | 
          docker build \
            -t uzairchini/devops-task-manager:${{ github.sha }} \
            -t uzairchini/devops-task-manager: latest .
      - name: Push SHA Tag 
        run: docker push uzairchini/devops-task-manager:${{ githu.sha }}
      
      - name: Push Latest Tag
        run: docker push uzairchini/devops-task-manager:latest 